name: Publish

# Publishes every workspace crate to crates.io, in dependency order, via
# Trusted Publishing (OIDC) — no long-lived token.
#
# One-time setup on crates.io (after each crate exists): crate Settings ->
# Trusted Publishing -> GitHub, with repository zhxiaogg/hackamore and
# workflow publish.yml (each crate needs its own config).
#
# Bootstrap caveat: trusted publishing can only be configured for crates that
# already exist on crates.io, so the very first publish falls back to the
# CARGO_REGISTRY_TOKEN repo secret. Delete the secret once OIDC is configured.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    permissions:
      id-token: write # mint the OIDC token exchanged for a temp crates.io token
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Authenticate with crates.io (OIDC)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1
        # First-ever publish has no trusted-publishing config yet; fall through
        # to the token secret below instead of failing the run.
        continue-on-error: true

      # Publish per crate, in dependency order, skipping versions that are
      # already on the registry. `cargo publish --workspace` hard-errors on
      # already-published members, which would wedge reruns after a partial
      # publish (e.g. a crates.io new-crate rate limit). `--locked` guards
      # against the lockfile drifting from what CI tested.
      - name: cargo publish
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          for crate in hackamore-models hackamore-policy hackamore-control hackamore-gateway hackamore-agent hackamore; do
            if curl -fsS -A "publish-workflow (github.com/zhxiaogg/hackamore)" \
                "https://crates.io/api/v1/crates/$crate/$VERSION" >/dev/null 2>&1; then
              echo "$crate@$VERSION already published, skipping"
              continue
            fi
            cargo publish -p "$crate" --locked
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token || secrets.CARGO_REGISTRY_TOKEN }}

  release-binaries:
    name: Release binaries (${{ matrix.target }})
    # Only meaningful for version tags; manual dispatch reruns (e.g. after a
    # crates.io rate limit) on a branch ref skip this job.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write # create the release and upload assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-latest # cross-compiled; Intel runners are being retired
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked -p hackamore -p hackamore-agent --target ${{ matrix.target }}

      - name: Package
        run: |
          tar -czf "hackamore-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz" \
            -C "target/${{ matrix.target }}/release" hackamore hackamore-agent

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # First matrix job to get here creates the release; the rest just upload.
          gh release create "$GITHUB_REF_NAME" --verify-tag --title "$GITHUB_REF_NAME" --generate-notes 2>/dev/null || true
          gh release upload "$GITHUB_REF_NAME" "hackamore-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz" --clobber
